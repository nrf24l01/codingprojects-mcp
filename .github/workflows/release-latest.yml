name: Build And Release Latest

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: 386
          - goos: linux
            goarch: arm
            goarm: "7"
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: windows
            goarch: 386

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Prepare build variables
        shell: bash
        run: |
          set -euo pipefail
          ext=""
          archive_ext="tar.gz"
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            ext=".exe"
            archive_ext="zip"
          fi

          suffix="${{ matrix.goos }}-${{ matrix.goarch }}"
          if [[ -n "${{ matrix.goarm || '' }}" ]]; then
            suffix="${suffix}-v${{ matrix.goarm }}"
          fi

          echo "binary_name=codingprojects-mcp${ext}" >> "$GITHUB_ENV"
          echo "asset_name=codingprojects-mcp-${suffix}" >> "$GITHUB_ENV"
          echo "archive_ext=${archive_ext}" >> "$GITHUB_ENV"

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm || '' }}
        run: go build -trimpath -tags "netgo osusergo" -ldflags="-s -w -extldflags '-static'" -o "dist/${{ env.binary_name }}" .

      - name: Package tarball
        if: matrix.goos != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          cp README.md dist/
          cp .env.example dist/
          tar -C dist -czf "release/${{ env.asset_name }}.${{ env.archive_ext }}" .

      - name: Package zip
        if: matrix.goos == 'windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          cp README.md dist/
          cp .env.example dist/
          (cd dist && zip -r "../release/${{ env.asset_name }}.${{ env.archive_ext }}" .)

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: codingprojects-mcp-${{ env.asset_name }}
          path: release/${{ env.asset_name }}.${{ env.archive_ext }}

  release:
    name: Publish latest release
    runs-on: ubuntu-latest
    needs: [build-binaries]

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: codingprojects-mcp-*
          merge-multiple: true
          path: ./dist

      - name: Generate sha256 files
        shell: bash
        run: |
          set -euo pipefail
          ls -lah ./dist
          cd ./dist
          for f in *; do
            if [ -f "$f" ] && [[ "$f" != *.sha256 ]]; then
              sha256sum "$f" > "$f.sha256"
            fi
          done
          ls -lah

      - name: Create or update latest release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: codingprojects-mcp (latest)
          body: |
            codingprojects-mcp autobuild (multi-arch).
            Binaries: linux amd64/386/armv7/arm64, darwin amd64/arm64, windows amd64/386/arm64.
            The `latest` tag always points to the most recent build.
          artifacts: "dist/*"
          allowUpdates: true
          replacesArtifacts: true
          artifactErrorsFailBuild: true
